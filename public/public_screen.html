<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Pantalla Karaoke</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      background: #050816;
      color: #f9fafb;
      min-height: 100vh;
      min-width: 1024px;      /* ancho mínimo de escritorio */
      display: flex;
      flex-direction: column;
      padding: 8px 24px;      /* un poco menos padding general */
      overflow-x: auto;
    }

    .container {
      width: 100%;
      max-width: 1600px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 8px;               /* menos separación vertical */
      height: 100vh;
    }

    header {
      text-align: center;
    }

    header h1 {
      font-size: 2.4rem;      /* más compacto */
      margin-bottom: 2px;
    }

    header p {
      font-size: 0.95rem;
      color: #9ca3af;
    }

    .queue-card {
      background: #111827;
      border-radius: 16px;
      padding: 10px 14px;     /* menos padding */
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      box-shadow: 0 10px 15px rgba(0,0,0,0.3);
    }

    .queue-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 4px;     /* menos separación */
    }

    .queue-header h2 {
      font-size: 1.3rem;
    }

    .queue-header span {
      font-size: 0.95rem;
      color: #9ca3af;
    }

    .queue-list {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding-right: 4px;
      margin-top: 2px;
      /* Altura efectiva: el flex hace que esta sección use casi todo lo disponible */
    }

    .queue-item {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding: 4px 10px;      /* muy compacto verticalmente */
      margin-bottom: 2px;
      border-radius: 999px;
      background: #020617;
      font-size: 0.95rem;     /* más pequeño */
      border: 1px solid transparent;
      min-height: 28px;       /* altura mínima controlada */
    }

    .queue-item-position {
      font-weight: 700;
      margin-right: 10px;
      font-size: 1.1rem;
      flex-shrink: 0;
    }

    .queue-item-main {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
    }

    /* Contenedor de toda la línea: si el texto es largo, scroll horizontal */
    .queue-item-line {
      white-space: nowrap;
      overflow-x: auto;
      overflow-y: hidden;
      width: 100%;
      font-weight: 500;
    }

    .queue-item-line::-webkit-scrollbar {
      height: 4px;
    }
    .queue-item-line::-webkit-scrollbar-thumb {
      background: #4b5563;
      border-radius: 999px;
    }

    .queue-item-left,
    .queue-item-right {
      white-space: nowrap;
    }

    /* Item actual resaltado */
    .queue-item.current {
      background: #f9fafb;
      color: #111827;
      border-color: #a855f7;
      box-shadow: 0 0 0 2px rgba(168,85,247,0.6);
    }

    .footer-card {
      background: #111827;
      border-radius: 16px;
      padding: 8px 16px;      /* footer más bajito */
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      box-shadow: 0 10px 15px rgba(0,0,0,0.3);
    }

    .footer-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .footer-info-title {
      font-size: 0.85rem;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .footer-password {
      font-size: 1.5rem;      /* un poco más pequeño para ganar altura total */
      font-weight: 700;
      letter-spacing: 0.18em;
    }

    .footer-qr {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 130px;           /* ligeramente más chico */
      height: 130px;
      background: #020617;
      border-radius: 16px;
      border: 1px dashed #4b5563;
      overflow: hidden;
      flex-shrink: 0;
    }

    .footer-qr img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .footer-qr-placeholder {
      font-size: 0.8rem;
      color: #6b7280;
      text-align: center;
      padding: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Turnos para el Karaoke</h1>
      <p>Consulta quién sigue, la contraseña y el QR para conectarte.</p>
    </header>

    <section class="queue-card">
      <div class="queue-header">
        <h2>Cola de participantes</h2>
        <span id="queue-count-label">0 en espera</span>
      </div>
      <div id="queue-list" class="queue-list">
        <div style="font-size:0.95rem; color:#9ca3af;">
          Aún no hay participantes en la cola.
        </div>
      </div>
    </section>

    <footer class="footer-card">
      <div class="footer-info">
        <span class="footer-info-title">Contraseña de acceso (pídela al administrador):</span>
        <span id="public-password" class="footer-password">••••</span>
      </div>

      <div class="footer-qr" id="public-qr">
        <div class="footer-qr-placeholder">
          Aquí aparecerá el código QR del día.<br />
          El administrador debe configurarlo.
        </div>
      </div>
    </footer>
  </div>

  <script src="public_screen.js"></script>
</body>
</html>
