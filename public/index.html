<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Karaoke - Usuario</title>
</head>
<body>
  <h1>Karaoke - Pantalla de usuario</h1>

  <h2>Inicio de sesión</h2>
  <div>
    <input id="name" type="text" placeholder="Tu nombre" />
    <input id="table" type="number" placeholder="Mesa" />
    <input id="pass" type="password" placeholder="Contraseña" />
    <button id="btn-login">Ingresar</button>
  </div>

  <h2>Buscar canción</h2>
  <div>
    <input id="artist" type="text" placeholder="Intérprete" />
    <input id="title" type="text" placeholder="Título" />
    <button id="btn-search">Buscar</button>
  </div>

  <h3>Resultados de búsqueda</h3>
  <div id="songs"></div>

  <h3>Cola de canciones</h3>
  <div id="queue"></div>

  <!-- Muy importante: el script va al final del body para que los elementos ya existan[web:533][web:538] -->
  <script src="main.js"></script>
</body>
</html>
