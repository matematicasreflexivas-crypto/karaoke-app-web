<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Karaoke - Usuario</title>

  <!-- Hace que la página se adapte al ancho del móvil -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Estilos básicos responsive -->
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      background: #050816;
      color: #f9fafb;
      min-height: 100vh;
      padding: 16px;
    }

    h1 {
      font-size: 1.4rem;
      text-align: center;
      margin-bottom: 16px;
    }

    h2 {
      font-size: 1.1rem;
      margin: 20px 0 8px;
    }

    h3 {
      font-size: 1rem;
      margin: 16px 0 8px;
    }

    .card {
      background: #111827;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 10px 15px rgba(0,0,0,0.3);
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    label {
      font-size: 0.85rem;
      color: #9ca3af;
    }

    input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #4b5563;
      background: #020617;
      color: #f9fafb;
      font-size: 0.95rem;
    }

    input::placeholder {
      color: #6b7280;
    }

    button {
      padding: 10px 16px;
      border-radius: 999px;
      border: none;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #4f46e5, #a855f7);
      color: #f9fafb;
      width: 100%;
    }

    .btn-secondary {
      background: #f9fafb;
      color: #111827;
      width: 100%;
    }

    .section-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .badge {
      font-size: 0.75rem;
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid #4b5563;
      color: #9ca3af;
    }

    #songs {
      margin-top: 8px;
      max-height: 45vh;
      overflow-y: auto;
      padding-right: 4px;
    }

    /* Cola: scroll horizontal y una línea por canción */
    #queue {
      margin-top: 8px;
      max-height: 20vh;
      padding-right: 4px;

      overflow-x: auto;      /* scroll horizontal */
      white-space: nowrap;   /* no partir en varias líneas */
    }

    /* Cada canción de la cola como bloque en una sola línea */
    .queue-item-line {
      display: inline-block;
      padding: 8px 12px;
      margin-right: 8px;
      margin-bottom: 4px;
      border-radius: 8px;
      background: #020617;
      font-size: 0.9rem;
    }

    /* Tarjetas de canción (resultados de búsqueda, si las usas así en main.js) */
    .song-item, .queue-item {
      padding: 10px 12px;
      border-radius: 8px;
      background: #020617;
      margin-bottom: 8px;
      font-size: 0.9rem;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .song-title {
      font-weight: 600;
      color: #e5e7eb;
    }

    .song-artist {
      font-size: 0.8rem;
      color: #9ca3af;
    }

    .song-actions {
      margin-top: 6px;
      display: flex;
      gap: 8px;
    }

    .song-actions button {
      flex: 1;
      padding: 8px;
      font-size: 0.85rem;
    }

    /* Layout un poco más ancho en tablets/desktop */
    @media (min-width: 768px) {
      body {
        display: flex;
        justify-content: center;
      }
      .container {
        width: 480px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Karaoke - Pantalla de usuario</h1>

    <!-- Inicio de sesión -->
    <div class="card">
      <div class="section-title-row">
        <h2>Inicio de sesión</h2>
        <span class="badge">Cliente</span>
      </div>

      <div class="form-group">
        <div>
          <label for="name">Tu nombre</label>
          <input id="name" type="text" placeholder="Ej. Ricardo" />
        </div>

        <div>
          <label for="table">Mesa</label>
          <input id="table" type="number" placeholder="Ej. 5" inputmode="numeric" />
        </div>

        <div>
          <label for="pass">Contraseña</label>
          <input id="pass" type="password" placeholder="Clave que te dio el bar" />
        </div>

        <button id="btn-login" class="btn-primary">Ingresar</button>
      </div>
    </div>

    <!-- Buscar canción -->
    <div class="card">
      <h2>Buscar canción</h2>

      <div class="form-group">
        <div>
          <label for="artist">Intérprete</label>
          <input id="artist" type="text" placeholder="Nombre del artista" />
        </div>

        <div>
          <label for="title">Título</label>
          <input id="title" type="text" placeholder="Nombre de la canción" />
        </div>

        <button id="btn-search" class="btn-secondary">Buscar</button>
      </div>
    </div>

    <!-- Resultados -->
    <div class="card">
      <h3>Resultados de búsqueda</h3>
      <div id="songs"></div>
    </div>

    <!-- Cola -->
    <div class="card">
      <h3>Cola de canciones</h3>
      <div id="queue"></div>
    </div>
  </div>

  <!-- El script va al final para que los elementos ya existan -->
  <script src="main.js"></script>
</body>
</html>
