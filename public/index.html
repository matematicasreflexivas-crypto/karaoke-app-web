<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Karaoke - Usuario</title>

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, interactive-widget=resizes-content"
  />

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    html, body {
      height: 100%;
    }

    body {
      background: #050816;
      color: #f9fafb;
      margin: 0;
      padding: 8px;
      display: flex;
      justify-content: center;
    }

    .container {
      max-width: 480px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    h1 {
      font-size: 1.1rem;
      text-align: center;
      margin-bottom: 6px;
    }

    h2 {
      font-size: 1.05rem;
      margin: 6px 0 4px;
    }

    h3 {
      font-size: 1rem;
      margin: 6px 0 4px;
    }

    .card {
      background: #111827;
      border-radius: 10px;
      padding: 8px 10px;
      margin-bottom: 8px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.25);
      position: relative;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .search-fields {
      display: flex;
      gap: 8px;
    }

    .search-field {
      flex: 1;
      min-width: 0;
    }

    label {
      font-size: 0.9rem;
      color: #e5e7eb;
    }

    input {
      width: 100%;
      padding: 7px 9px;
      border-radius: 8px;
      border: 1px solid #4b5563;
      background: #020617;
      color: #f9fafb;
      font-size: 0.9rem;
    }

    input::placeholder {
      color: #6b7280;
      font-size: 0.85rem;
    }

    button {
      padding: 8px 11px;
      border-radius: 999px;
      border: none;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #4f46e5, #a855f7);
      color: #f9fafb;
      width: 100%;
    }

    .btn-toggle-action {
      background: linear-gradient(135deg, #4f46e5, #a855f7);
      color: #f9fafb;
      width: 100%;
      font-size: 0.85rem;
      margin-bottom: 4px;
    }

    .btn-logout-danger {
      background: #dc2626;
      color: #f9fafb;
      width: 100%;
      font-size: 0.9rem;
      margin-top: 4px;
    }

    .section-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
    }

    .badge {
      font-size: 0.75rem;
      padding: 2px 6px;
      border-radius: 999px;
      border: 1px solid #4b5563;
      color: #9ca3af;
    }

.top-buttons {
  display: flex;
  flex-direction: column;
  gap: 4px;
  margin-bottom: 12px;
  position: relative;
  background: #050816;
  z-index: 10;
  padding-top: 4px;
  padding-bottom: 4px;
}

.top-buttons button {
  min-height: 40px;
  flex-shrink: 0;
}

    .top-toggle-login {
      margin-bottom: 12px;
    }

    #songs {
      margin-top: 4px;
      max-height: 15vh;
      padding-right: 4px;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .song-result {
      display: block;
      padding: 4px 8px;
      margin-bottom: 3px;
      border-radius: 6px;
      background: #ffffff;
      border: 1px solid #d1d5db;
      color: #111827;
      font-size: 0.95rem;
      text-align: left;
      width: 100%;
    }

    .queue-item-line {
      display: block;
      padding: 4px 8px;
      margin-bottom: 3px;
      border-radius: 6px;
      background: #020617;
      font-size: 0.95rem;
      white-space: nowrap;
    }

    .song-item, .queue-item {
      padding: 8px 10px;
      border-radius: 8px;
      background: #020617;
      margin-bottom: 6px;
      font-size: 0.95rem;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .queue-user-name-highlight {
      background: #ffffff;
      color: #000000;
      padding: 0 4px;
      border-radius: 4px;
    }

    .queue-item-is-current {
      background: #f9fafb !important;
      color: #111827 !important;
      border: 1px solid #a855f7 !important;
      box-shadow: 0 0 0 2px rgba(168,85,247,0.6);
    }

    #user-content.layout {
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
      overflow-y: auto;
      min-height: 0;
    }

    .queue-scroll {
      margin-top: 4px;
      padding-right: 4px;
      max-height: 50vh;
      overflow-y: auto !important;
      overflow-x: hidden;
      scrollbar-width: thin;
      scrollbar-color: #4b5563 #111827;
    }

    #middle-section {
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex: 1;
      overflow-y: auto;
      min-height: 0;
    }

    /* contenedor horizontal de colas */
    .queues-row-wrapper {
      display: flex;
      flex-direction: row;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 4px;
      -webkit-overflow-scrolling: touch;
    }

    .queues-row-wrapper .queue-card {
      min-width: 260px;
      flex-shrink: 0;
    }

    .mixed-from-catalog { border-left: 3px solid #22c55e; }
    .mixed-from-manual { border-left: 3px solid #f97316; }

    @media (min-width: 768px) {
      .container { width: 480px; }
    }
  </style>

  <script>
    function normalizeUserNameInput(input) {
      input.value = input.value
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .toUpperCase();
    }
    document.addEventListener('DOMContentLoaded', () => {
      const loginCard = document.getElementById('login-card');
      const loginInputs = ['name', 'table', 'pass']
        .map(id => document.getElementById(id))
        .filter(Boolean);
      loginInputs.forEach(inp => {
        inp.addEventListener('focus', () => {
          if (!loginCard) return;
          setTimeout(() => {
            loginCard.scrollTo({
              top: loginCard.scrollHeight,
              behavior: 'smooth'
            });
          }, 200);
        });
      });
    });
  </script>
</head>
<body>
  <div class="container">
    <h1>Karaoke - Pantalla de usuario</h1>
    <button id="btn-toggle-login-card" class="btn-primary top-toggle-login" style="display:none;">
      Mostrar datos de registro
    </button>

    <div class="card" id="login-card">
      <div class="section-title-row">
        <h2>Inicio de sesión</h2>
        <span class="badge">Cliente</span>
      </div>

      <div class="form-group">
        <div>
          <label for="name">Tu nombre</label>
          <input id="name" type="text" placeholder="Ej. Ricardo" oninput="normalizeUserNameInput(this)" />
        </div>
        <div>
          <label for="table">Mesa</label>
          <input id="table" type="text" placeholder="Ej. 5, VIP 1" />
        </div>
        <div>
          <label for="pass">Contraseña</label>
          <input id="pass" type="password" placeholder="Clave que te dio el bar" />
        </div>
        <button id="btn-login" class="btn-primary">Ingresar</button>
      </div>
    </div>

    <div id="user-content" class="layout" style="display:none;">

      <div class="top-buttons" id="top-buttons-container">
        <button id="btn-toggle-search-card" class="btn-toggle-action" style="display:none;">
          Ocultar "Buscar canción"
        </button>
        <button id="btn-toggle-queue-card" class="btn-toggle-action" style="display:none;">
          Mostrar cola de participantes
        </button>
        <button id="btn-toggle-manual-card" class="btn-toggle-action" style="display:none;">
          Mostrar "Registro manual"
        </button>
        <button id="btn-toggle-manual-queue-card" class="btn-toggle-action" style="display:none;">
          Mostrar cola manual
        </button>
        <button id="btn-toggle-mixed-queue-card" class="btn-toggle-action" style="display:none;">
          Mostrar cola mixta
        </button>
        <button id="btn-toggle-suggest-card" class="btn-toggle-action" style="display:none;">
          Mostrar sugerencia de canción
        </button>
        <button id="btn-toggle-history-card" class="btn-toggle-action" style="display:none;">
          Mostrar historial de canciones
        </button>
      </div>

      <div id="top-section">
        <div class="card" id="search-card">
          <h2>Buscar canción</h2>
          <div class="form-group">
            <div class="search-fields">
              <div class="search-field">
                <label for="title">Título</label>
                <input id="title" type="text" placeholder="Nombre de la canción" />
              </div>
              <div class="search-field">
                <label for="artist">Intérprete</label>
                <input id="artist" type="text" placeholder="Nombre del artista" />
              </div>
            </div>
            <button id="btn-search" class="btn-primary">Buscar</button>
          </div>
        </div>

        <div class="card" id="manual-card" style="display:none;">
          <h2>Registro manual</h2>
          <div class="form-group">
            <input id="manual-title" type="text" placeholder="Título de la canción" />
            <input id="manual-artist" type="text" placeholder="Intérprete" />
            <button id="btn-send-manual" class="btn-primary">Registrar canción manual</button>
          </div>
        </div>

        <div class="card" id="suggest-card" style="display:none;">
          <h2>Sugerir canción</h2>
          <div class="form-group">
            <input id="suggest-title" type="text" placeholder="Título" />
            <input id="suggest-artist" type="text" placeholder="Artista" />
            <button id="btn-send-suggestion" class="btn-primary">Enviar sugerencia</button>
          </div>
        </div>
      </div>

      <div id="middle-section">
        <div class="card" id="search-results-card" style="display:none;">
          <h3>Resultados de búsqueda</h3>
          <div id="songs"></div>
        </div>

        <!-- Bloque de colas con scroll horizontal -->
        <div class="queues-row-wrapper">
          <div class="card queue-card" id="queue-card" style="display:none;">
            <h3>Cola de participantes</h3>
            <div id="queue" class="queue-scroll"></div>
          </div>

          <div class="card queue-card" id="manual-queue-card" style="display:none;">
            <h3>Participantes (Carga manual)</h3>
            <div id="manual-queue" class="queue-scroll"></div>
          </div>

          <div class="card queue-card" id="mixed-queue-card" style="display:none;">
            <h3>Cola mixta (General)</h3>
            <div id="mixed-queue-list" class="queue-scroll"></div>
          </div>
        </div>

        <div class="card queue-card" id="history-card" style="display:none;">
          <h3>Historial de canciones</h3>
          <div id="history-list" class="queue-scroll"></div>
        </div>
      </div>

      <button id="btn-logout" class="btn-logout-danger">
        Cerrar sesión
      </button>

    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
