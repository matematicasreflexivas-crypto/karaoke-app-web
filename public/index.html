<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Karaoke - Usuario</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      background: #050816;
      color: #f9fafb;
      min-height: 100vh;
      padding: 8px;
    }

    .container {
      max-width: 480px;
      margin: 0 auto;
    }

    /* Título principal */
    h1 {
      font-size: 1.1rem;
      text-align: center;
      margin-bottom: 10px;
    }

    /* Títulos secundarios */
    h2 {
      font-size: 1.05rem;
      margin: 8px 0 6px;
    }

    h3 {
      font-size: 1rem;
      margin: 6px 0 4px;
    }

    .card {
      background: #111827;
      border-radius: 10px;
      padding: 10px 12px;
      margin-bottom: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.25);
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-size: 0.95rem;
      color: #e5e7eb;
    }

    input {
      width: 100%;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid #4b5563;
      background: #020617;
      color: #f9fafb;
      font-size: 0.95rem;
    }

    input::placeholder {
      color: #6b7280;
      font-size: 0.9rem;
    }

    button {
      padding: 9px 12px;
      border-radius: 999px;
      border: none;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #4f46e5, #a855f7);
      color: #f9fafb;
      width: 100%;
    }

    .section-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
    }

    .badge {
      font-size: 0.8rem;
      padding: 3px 7px;
      border-radius: 999px;
      border: 1px solid #4b5563;
      color: #9ca3af;
    }

    /* Contenedor de botones superiores (toggles) */
    .top-buttons {
      display: flex;
      flex-direction: column;
      gap: 16px;          /* espacio vertical entre botones de usuario */
      margin-bottom: 10px;
    }

    /* Separación entre "Mostrar datos de registro" y los toggles de usuario */
    .top-toggle-login {
      margin-bottom: 16px; /* mismo valor que gap para armonía */
    }

    /* Resultados de búsqueda */
    #songs {
      margin-top: 4px;
      max-height: 22vh;
      overflow-y: auto;
      padding-right: 4px;
    }

    /* Cola: scroll vertical + horizontal para toda la lista */
    #queue {
      margin-top: 4px;
      max-height: 46vh;
      padding-right: 4px;
      overflow-y: auto;
      overflow-x: auto;
      white-space: nowrap;
    }

    .queue-item-line {
      display: block;
      padding: 4px 8px;
      margin-bottom: 3px;
      border-radius: 6px;
      background: #020617;
      font-size: 0.95rem;
      white-space: nowrap;
    }

    .song-item, .queue-item {
      padding: 8px 10px;
      border-radius: 8px;
      background: #020617;
      margin-bottom: 6px;
      font-size: 0.95rem;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .song-title {
      font-weight: 600;
      color: #e5e7eb;
    }

    .song-artist {
      font-size: 0.9rem;
      color: #9ca3af;
    }

    .song-actions {
      margin-top: 4px;
      display: flex;
      gap: 6px;
    }

    .song-actions button {
      flex: 1;
      padding: 7px;
      font-size: 0.9rem;
    }

    @media (min-width: 768px) {
      body {
        display: flex;
        justify-content: center;
      }
      .container {
        width: 480px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Karaoke - Pantalla de usuario</h1>

    <!-- Botón para mostrar/ocultar ficha de registro -->
    <button id="btn-toggle-login-card" class="btn-primary top-toggle-login" style="display:none;">
      Mostrar datos de registro
    </button>

    <!-- Inicio de sesión -->
    <div class="card" id="login-card">
      <div class="section-title-row">
        <h2>Inicio de sesión</h2>
        <span class="badge">Cliente</span>
      </div>

      <div class="form-group">
        <div>
          <label for="name">Tu nombre</label>
          <input id="name" type="text" placeholder="Ej. Ricardo" />
        </div>

        <div>
          <label for="table">Mesa</label>
          <input
            id="table"
            type="text"
            placeholder="Ej. 5, VIP 1, VIP-1"
          />
        </div>

        <div>
          <label for="pass">Contraseña</label>
          <input id="pass" type="password" placeholder="Clave que te dio el bar" />
        </div>

        <button id="btn-login" class="btn-primary">Ingresar</button>
      </div>
    </div>

    <!-- CONTENIDO SOLO PARA USUARIOS LOGUEADOS -->
    <div id="user-content" style="display:none;">

      <!-- Grupo de botones de toggles del usuario -->
      <div class="top-buttons">
        <!-- Botón para mostrar/ocultar la sección de búsqueda -->
        <button id="btn-toggle-search-card" class="btn-primary" style="display:none;">
          Ocultar "Buscar canción"
        </button>

        <!-- Botón mostrar/ocultar cola de canciones -->
        <button id="btn-toggle-queue-card" class="btn-primary" style="display:none;">
          Ocultar cola de canciones
        </button>
      </div>

      <!-- Buscar canción -->
      <div class="card" id="search-card">
        <h2>Buscar canción</h2>

        <div class="form-group">
          <div>
            <label for="artist">Intérprete</label>
            <input id="artist" type="text" placeholder="Nombre del artista" />
          </div>

          <div>
            <label for="title">Título</label>
            <input id="title" type="text" placeholder="Nombre de la canción" />
          </div>

          <button id="btn-search" class="btn-primary">Buscar</button>
        </div>
      </div>

      <!-- Resultados -->
      <div class="card">
        <h3>Resultados de búsqueda</h3>
        <div id="songs"></div>
      </div>

      <!-- Cola -->
      <div class="card">
        <h3>Cola de canciones</h3>
        <div id="queue"></div>
      </div>

    </div>
  </div>

  <!-- Script de la lógica -->
  <script src="main.js"></script>
</body>
</html>
